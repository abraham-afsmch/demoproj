<!DOCTYPE html>
<html>
<head><title>Student Registration Form</title></head>
<body>
<h2>Student Registration Form</h2>
<form>
First Name:<input type="text" placeholder="First Name"><br><br>
Last Name:<input type="text" placeholder="Last Name"><br><br>
Birth Date:<input type="date"><br><br>
Gender:<input type="radio" name="gender"> Male<input type="radio" name="gender"> Female<input type="radio" name="gender"> Other<br><br>
Address Line 1:<input type="text"><br><br>
Address Line 2:<input type="text"><br><br>
City:<input type="text"><br><br>
Region:<input type="text"><br><br>
Postal / Zip Code:<input type="text"><br><br>
Country:<select><option>India</option><option>USA</option><option>UK</option></select><br><br>
Email:<input type="email" placeholder="john.doe@example.com"><br><br>
Phone:<input type="tel"><br><br>
Work Phone:<input type="tel"><br><br>
Company:<input type="text"><br><br>
Courses:<select><option>Please Select</option><option>BCA</option><option>BTech</option><option>MCA</option></select><br><br>
Comments:<br><textarea rows="4" cols="30"></textarea><br><br>
<input type="reset" value="Clear Fields"><input type="submit" value="Submit Application">
</form>
</body>
</html>
